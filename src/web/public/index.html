<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TXCode - AI 编程助手</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; }
    
    .container { display: flex; flex-direction: column; height: 100%; max-width: 1200px; margin: 0 auto; }
    
    header { padding: 1rem; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.5rem; color: #0af; }
    header .status { font-size: 0.875rem; color: #888; }
    
    .main { display: flex; flex: 1; overflow: hidden; }
    
    .sidebar { width: 250px; border-right: 1px solid #333; display: flex; flex-direction: column; }
    .sidebar h2 { padding: 1rem; font-size: 0.875rem; color: #888; border-bottom: 1px solid #333; }
    .session-list { flex: 1; overflow-y: auto; }
    .session-item { padding: 0.75rem 1rem; cursor: pointer; border-bottom: 1px solid #222; }
    .session-item:hover { background: #252540; }
    .session-item.active { background: #2a2a4a; border-left: 3px solid #0af; }
    .session-item .title { font-size: 0.875rem; }
    .session-item .time { font-size: 0.75rem; color: #666; margin-top: 0.25rem; }
    
    .chat-area { flex: 1; display: flex; flex-direction: column; }
    .messages { flex: 1; overflow-y: auto; padding: 1rem; }
    .message { margin-bottom: 1rem; }
    .message .role { font-size: 0.75rem; color: #888; margin-bottom: 0.25rem; }
    .message.user .role { color: #4a4; }
    .message.assistant .role { color: #48f; }
    .message .content { background: #252540; padding: 0.75rem; border-radius: 8px; white-space: pre-wrap; }
    .message.user .content { background: #1a3a1a; }
    .message.assistant .content { background: #1a2a3a; }
    
    .input-area { padding: 1rem; border-top: 1px solid #333; }
    .input-wrapper { display: flex; gap: 0.5rem; }
    .input-wrapper input { flex: 1; padding: 0.75rem; border: 1px solid #444; border-radius: 8px; background: #252540; color: #eee; font-size: 1rem; }
    .input-wrapper input:focus { outline: none; border-color: #0af; }
    .input-wrapper button { padding: 0.75rem 1.5rem; background: #0af; border: none; border-radius: 8px; color: #000; cursor: pointer; font-weight: bold; }
    .input-wrapper button:hover { background: #0cf; }
    .input-wrapper button:disabled { background: #444; cursor: not-allowed; }
    
    .skills-panel { width: 200px; border-left: 1px solid #333; padding: 1rem; }
    .skills-panel h2 { font-size: 0.875rem; color: #888; margin-bottom: 1rem; }
    .skill-item { padding: 0.5rem; margin-bottom: 0.5rem; background: #252540; border-radius: 4px; cursor: pointer; font-size: 0.875rem; }
    .skill-item:hover { background: #2a2a4a; }
    .skill-item.active { background: #2a4a6a; border-left: 3px solid #0af; }
    
    .error { background: #4a2020; color: #f88; padding: 0.5rem; border-radius: 4px; margin: 0.5rem 0; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>TXCode</h1>
      <div class="status" id="status">就绪</div>
    </header>
    
    <div class="main">
      <div class="sidebar">
        <h2>会话</h2>
        <div class="session-list" id="sessionList"></div>
      </div>
      
      <div class="chat-area">
        <div class="messages" id="messages"></div>
        <div class="input-area">
          <div class="input-wrapper">
            <input type="text" id="input" placeholder="输入消息或命令..." />
            <button id="sendBtn">发送</button>
          </div>
        </div>
      </div>
      
      <div class="skills-panel">
        <h2>技能</h2>
        <div id="skillsList"></div>
      </div>
    </div>
  </div>
  
  <script>
    const API_BASE = '/api';
    let currentSession = null;
    let currentSkill = null;
    
    const sessionList = document.getElementById('sessionList');
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('status');
    const skillsList = document.getElementById('skillsList');
    
    async function fetchAPI(endpoint, options = {}) {
      const res = await fetch(`${API_BASE}${endpoint}`, {
        headers: { 'Content-Type': 'application/json' },
        ...options
      });
      return res.json();
    }
    
    async function loadSessions() {
      const data = await fetchAPI('/sessions');
      sessionList.innerHTML = data.data.map(s => `
        <div class="session-item ${s.id === currentSession ? 'active' : ''}" onclick="selectSession('${s.id}')">
          <div class="title">${s.title}</div>
          <div class="time">${new Date(s.updatedAt).toLocaleString()}</div>
        </div>
      `).join('') || '<div style="padding:1rem;color:#666;">暂无会话</div>';
    }
    
    async function loadSkills() {
      const data = await fetchAPI('/skills');
      skillsList.innerHTML = data.data.map(s => `
        <div class="skill-item ${s.name === currentSkill ? 'active' : ''}" onclick="selectSkill('${s.name}')">
          ${s.name}
        </div>
      `).join('');
    }
    
    async function selectSession(id) {
      currentSession = id;
      await fetchAPI(`/sessions/${id}/switch`, { method: 'POST' });
      await loadSessions();
      await loadMessages();
    }
    
    async function selectSkill(name) {
      currentSkill = name;
      await loadSkills();
      addMessage('system', `已激活技能: ${name}`);
    }
    
    async function loadMessages() {
      if (!currentSession) return;
      const data = await fetchAPI(`/chat/history/${currentSession}`);
      messagesDiv.innerHTML = data.data.map(m => `
        <div class="message ${m.role}">
          <div class="role">${m.role}</div>
          <div class="content">${escapeHtml(m.content)}</div>
        </div>
      `).join('');
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function addMessage(role, content) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = `<div class="role">${role}</div><div class="content">${escapeHtml(content)}</div>`;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    
    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;
      
      input.value = '';
      addMessage('user', message);
      setStatus('思考中...');
      sendBtn.disabled = true;
      
      try {
        const data = await fetchAPI('/chat', {
          method: 'POST',
          body: JSON.stringify({ message, sessionId: currentSession, skill: currentSkill })
        });
        
        if (data.success) {
          currentSession = data.data.sessionId;
          addMessage('assistant', data.data.response);
          await loadSessions();
        } else {
          addMessage('system', `错误: ${data.error}`);
        }
      } catch (err) {
        addMessage('system', `错误: ${err.message}`);
      } finally {
        setStatus('就绪');
        sendBtn.disabled = false;
      }
    }
    
    function setStatus(text) {
      statusDiv.textContent = text;
    }
    
    sendBtn.onclick = sendMessage;
    input.onkeypress = e => { if (e.key === 'Enter') sendMessage(); };
    
    // 初始化
    loadSessions();
    loadSkills();
  </script>
</body>
</html>
