<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - {{ site_name }}</title>
    <script src="{{ assets_path }}tailwindcss.js"></script>
    <link rel="stylesheet" href="{{ assets_path }}font-awesome/css/all.min.css">
    <link rel="stylesheet" href="{{ assets_path }}fonts/inter.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
    <link rel="stylesheet" href="{{ assets_path }}zihao_doc.css">
</head>
<body class="bg-white text-slate-800 antialiased flex flex-col h-screen overflow-hidden selection:bg-brand-500 selection:text-white">

    <header class="flex-shrink-0 relative z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 h-16 flex items-center justify-between px-4 sm:px-6 lg:px-8">
        <div class="flex items-center">
            <button id="mobile-menu-btn" class="md:hidden mr-4 text-slate-500 hover:text-slate-900 transition-colors">
                <i class="fa-solid fa-bars text-xl"></i>
            </button>
            
            <a href="index.html" class="flex items-center group cursor-pointer mr-6">
                <div class="w-7 h-7 bg-gradient-to-br from-brand-500 to-indigo-600 rounded flex items-center justify-center mr-2 text-white shadow-sm">
                    <i class="fa-solid fa-shield-halved text-xs"></i>
                </div>
                <span class="font-bold text-lg tracking-tight text-slate-900 mr-2 border-r border-slate-300 pr-2">{{ site_name }}</span>
                <span class="text-slate-500 font-medium">文档中心</span>
            </a>
        </div>
        
        <div class="flex items-center space-x-4 text-sm font-medium">
            <div class="relative">
                <input type="text" id="search-input" placeholder="搜索文档..." 
                    class="w-48 lg:w-64 px-3 py-1.5 pl-9 text-sm bg-slate-100 border border-transparent rounded-lg focus:outline-none focus:bg-white focus:border-brand-500 focus:ring-2 focus:ring-brand-200 transition-all">
                <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                <div id="search-results" class="hidden absolute top-full right-0 mt-2 w-80 max-h-96 overflow-y-auto bg-white rounded-lg shadow-xl border border-slate-200 z-50"></div>
            </div>
            <a href="https://gitee.com/homecommunity/zihao_doc" target="_blank" class="text-slate-400 hover:text-slate-900 transition-colors">
                <i class="fa-brands fa-github text-xl"></i>
            </a>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        
        <aside id="sidebar" class="w-72 flex-shrink-0 bg-slate-50/50 border-r border-slate-200 overflow-y-auto hidden md:block transition-transform duration-300 absolute md:relative z-40 h-full flex flex-col">
            <nav class="px-4 py-6 space-y-1 flex-1 overflow-y-auto min-h-0">
                {{{ menu }}}
            </nav>
            <div class="px-4 py-4 border-t border-slate-200 flex-shrink-0">
                <a href="https://gitee.com/homecommunity/zihao_doc" target="_blank" class="flex items-center justify-center px-3 py-2 text-xs text-slate-400 hover:text-brand-500 transition-colors">
                    <span>本文档由</span>
                    <span class="mx-1 font-medium">梓豪doc</span>
                    <span>创建</span>
                </a>
            </div>
        </aside>

        <div id="mobile-overlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-30 hidden md:hidden"></div>

        <main class="flex-1 overflow-y-auto bg-white scroll-smooth relative w-full">
            <div class="max-w-4xl mx-auto px-6 py-10 lg:px-12 lg:py-14">
                
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center text-sm text-slate-500" id="breadcrumb">
                        <a href="index.html" class="hover:text-brand-600 transition-colors">{{ site_name }}</a>
                        <i class="fa-solid fa-chevron-right text-[10px] mx-2"></i>
                        <span class="text-slate-900 font-medium">{{ breadcrumb }}</span>
                    </div>
                    <button id="copy-link" class="flex items-center gap-1.5 px-3 py-1.5 text-sm text-slate-500 hover:text-brand-600 hover:bg-slate-100 rounded-lg transition-colors" title="复制链接">
                        <i class="fa-regular fa-copy"></i>
                        <span class="copy-text">复制链接</span>
                    </button>
                </div>

                <article class="prose prose-slate prose-brand max-w-none 
                                prose-headings:font-bold prose-headings:tracking-tight 
                                prose-a:text-brand-600 prose-a:font-medium prose-a:no-underline hover:prose-a:underline
                                prose-pre:bg-slate-900 prose-pre:shadow-lg prose-pre:border prose-pre:border-slate-800"
                                id="article-content">
                    {{{ content }}}
                </article>

                <div class="mt-16 pt-8 border-t border-slate-200 flex justify-between items-center gap-4 text-sm font-medium" id="pagination">
                </div>
            </div>

            <aside id="toc" class="hidden lg:block w-56 flex-shrink-0 fixed right-8 top-32 h-fit max-h-[calc(100vh-8rem)] overflow-y-auto">
                <div class="text-sm font-semibold text-slate-800 mb-4">目录</div>
                <nav id="toc-nav" class="space-y-1 text-sm"></nav>
            </aside>
        </main>
    </div>

    <div id="image-preview" class="fixed inset-0 z-[100] bg-black/90 hidden items-center justify-center cursor-zoom-out">
        <img id="preview-img" class="max-w-[90vw] max-h-[90vh] object-contain" src="" alt="预览">
    </div>

    <script src="{{ assets_path }}zihao_doc.js"></script>
</body>
</html>
